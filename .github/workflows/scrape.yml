name: Scan Pokemon-lager

on:
  schedule:
    # GitHub sin "schedule"-trigger er i praksis svært upålitelig: målinger
    # over 58+ timer med "*/20", "*/30" og forskjøvet "7,37" ga bare 6
    # faktiske kjøringer totalt (forventet 50-150+). GitHub dropper altså
    # de aller fleste tikkene uansett frekvens/forskyvning, ikke bare de som
    # treffer :00/:30. Eneste praktiske avbøtning er å oppgi mange
    # forskjøvne tidspunkt per time, slik at selv med en høy drop-rate
    # overlever nok tikk til å gi rimelig hyppige faktiske kjøringer.
    # Hvert 5. minutt (maks tillatt frekvens hos GitHub), ikke mellom
    # 22:00-04:00 norsk tid (nattsjekken i "time_check"-steget under
    # håndterer den nøyaktige Oslo-grensen, inkl. sommer-/vintertid).
    # Timene er begrenset til 2-20 UTC, som dekker hele det norske
    # dagvinduet (04:00-22:00) både sommer og vinter.
    #
    # Skrevet som separate "- cron:"-oppføringer i stedet for én
    # kommaseparert streng, som et forsøk på å se om GitHub sin
    # planlegger behandler disse ulikt (ren empirisk test, siden komma-
    # separert liste ikke ga noen bekreftede kjøringer i løpet av 20+ min).
    - cron: "2 2-20 * * *"
    - cron: "7 2-20 * * *"
    - cron: "12 2-20 * * *"
    - cron: "17 2-20 * * *"
    - cron: "22 2-20 * * *"
    - cron: "27 2-20 * * *"
    - cron: "32 2-20 * * *"
    - cron: "37 2-20 * * *"
    - cron: "42 2-20 * * *"
    - cron: "47 2-20 * * *"
    - cron: "52 2-20 * * *"
    - cron: "57 2-20 * * *"
  workflow_dispatch:  # lar deg trykke "Run workflow" manuelt på GitHub
    inputs:
      send_test_notification:
        description: "Kun send en test-varsel via ntfy (ingen skanning)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk tid (hopp over hvis natt)
        id: time_check
        run: |
          # TZ='Europe/Oslo' gir riktig lokal time direkte (haandterer CET/CEST
          # automatisk), i stedet for a regne pa et fast UTC-offset som blir
          # feil halve aaret pga sommertid.
          HOUR=$(TZ='Europe/Oslo' date +%H)
          # 10#$HOUR tvinger tolkning som grunntall 10 (ellers feiltolker bash
          # f.eks. "08"/"09" som ugyldige oktale tall)
          if [[ 10#$HOUR -ge 22 || 10#$HOUR -lt 4 ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏸️ Skipping - det er natt i Norge"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Fortsetter - det er dag i Norge"
          fi

      - name: Checkout repo
        if: steps.time_check.outputs.skip == 'false' || github.event.inputs.send_test_notification == 'true'
        uses: actions/checkout@v4

      - name: Sett opp Python
        if: steps.time_check.outputs.skip == 'false' || github.event.inputs.send_test_notification == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Python-avhengigheter
        if: steps.time_check.outputs.skip == 'false' || github.event.inputs.send_test_notification == 'true'
        run: pip install -r requirements.txt

      - name: Installer Playwright-nettleser
        if: steps.time_check.outputs.skip == 'false' && github.event.inputs.send_test_notification != 'true'
        run: playwright install --with-deps chromium

      - name: Send test-varsel (ntfy)
        if: github.event.inputs.send_test_notification == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || 'pokemon-lager-sk82sw9vyl' }}
        run: python scrape.py --test-notification

      - name: Kjør scraper
        if: steps.time_check.outputs.skip == 'false' && github.event.inputs.send_test_notification != 'true'
        env:
          # Brukes til a sende push-varsel via ntfy.sh nar boten finner nye
          # produkter/restock (se send_ntfy_notification() i scrape.py).
          # Standardverdien under er et tilfeldig generert topic-navn -- du
          # kan abonnere pa det i ntfy-appen med en gang. Vil du bruke et
          # annet (mer privat) navn, sett en repo-secret kalt NTFY_TOPIC i
          # Settings -> Secrets and variables -> Actions, den overstyrer da
          # standardverdien automatisk.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || 'pokemon-lager-sk82sw9vyl' }}
        run: python scrape.py

      - name: Last opp debug-skjermbilder (hvis noen sider feilet)
        if: always() && steps.time_check.outputs.skip == 'false' && github.event.inputs.send_test_notification != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_screenshots/
          if-no-files-found: ignore

      - name: Commit og push oppdatert data
        if: steps.time_check.outputs.skip == 'false' && github.event.inputs.send_test_notification != 'true'
        run: |
          git config user.name "pokemon-lagerbot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/changes.json docs/history.json
          git diff --quiet --cached || git commit -m "Oppdater lagerstatus [automatisk]"
          git push
